<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}audioslop{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>a</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="nav-bar">
        <a href="/" class="nav-brand">audioslop</a>
        {% if session.get('user_id') %}
        <div style="display: flex; align-items: center; gap: 1rem;">
            {% if session.get('is_admin') %}
            <a href="/admin" class="nav-link">admin</a>
            {% endif %}
            <span style="color: var(--text-muted); font-size: 0.85rem;">{{ session.get('user_name') }}</span>
            <a href="/logout" class="nav-link">log out</a>
        </div>
        {% endif %}
    </nav>
    {% block body %}
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
