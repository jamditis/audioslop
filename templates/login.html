{% extends "base.html" %}
{% block title %}log in - audioslop{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <form method="POST" class="w-full max-w-sm space-y-4">
        <h1 class="text-2xl font-semibold text-center">audioslop</h1>
        {% if error %}
        <p class="text-red-400 text-sm text-center">{{ error }}</p>
        {% endif %}
        <input
            type="password"
            name="password"
            placeholder="password"
            autofocus
            required
            class="w-full px-4 py-2 bg-gray-900 border border-gray-700 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:border-gray-500"
        >
        <button
            type="submit"
            class="w-full px-4 py-2 bg-gray-100 text-gray-900 font-medium rounded-lg hover:bg-white transition-colors"
        >
            log in
        </button>
    </form>
</div>
{% endblock %}
